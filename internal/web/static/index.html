<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>msgvault</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-left">
            <h1>msgvault</h1>
        </div>
        <div class="header-center">
            <div class="search-box">
                <span class="search-icon">&#128269;</span>
                <input type="text" id="search-input" placeholder="Rechercher dans vos emails..." autocomplete="off">
                <button id="search-clear" class="search-clear hidden">&times;</button>
            </div>
        </div>
        <div class="header-right">
            <span id="stats-bar" class="stats-badge"></span>
            <button id="theme-toggle" title="Theme" aria-label="Theme">&#9681;</button>
        </div>
    </header>

    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-section">
                <h3>Navigation</h3>
                <a href="#" class="sidebar-item active" data-view="dashboard">
                    <span class="icon">&#127968;</span> Tableau de bord
                </a>
                <a href="#" class="sidebar-item" data-view="messages">
                    <span class="icon">&#9993;</span> Tous les messages
                </a>
            </div>

            <div class="sidebar-section">
                <h3>Labels <span id="label-count" class="count-badge"></span></h3>
                <div id="sidebar-labels" class="sidebar-scroll"></div>
            </div>

            <div class="sidebar-section">
                <h3>Top expediteurs</h3>
                <div id="sidebar-senders" class="sidebar-scroll"></div>
            </div>
        </aside>

        <!-- Main content -->
        <main>
            <!-- Dashboard -->
            <section id="view-dashboard" class="view active">
                <div class="dashboard-grid" id="dashboard-stats"></div>
                <div class="section-header">
                    <h2>Messages recents</h2>
                </div>
                <div id="dashboard-recent" class="message-list"></div>
            </section>

            <!-- Messages list -->
            <section id="view-messages" class="view">
                <div class="section-header">
                    <h2 id="messages-title">Tous les messages</h2>
                    <span id="messages-count" class="count-text"></span>
                </div>
                <div id="message-list" class="message-list"></div>
                <div id="pagination" class="pagination"></div>
            </section>

            <!-- Search results -->
            <section id="view-search" class="view">
                <div class="section-header">
                    <h2 id="search-title">Resultats</h2>
                </div>
                <div id="search-results" class="message-list"></div>
                <div id="search-pagination" class="pagination"></div>
            </section>

            <!-- Message detail (overlay) -->
            <div id="message-detail" class="detail-panel hidden">
                <div class="detail-toolbar">
                    <button id="detail-close" class="btn-back">&#8592; Retour</button>
                </div>
                <div class="detail-card">
                    <div class="detail-subject-row">
                        <h2 id="detail-subject"></h2>
                    </div>
                    <div class="detail-participants">
                        <div class="participant-row">
                            <span class="participant-label">De</span>
                            <span id="detail-from" class="participant-value clickable"></span>
                        </div>
                        <div class="participant-row">
                            <span class="participant-label">A</span>
                            <span id="detail-to" class="participant-value"></span>
                        </div>
                        <div class="participant-row">
                            <span class="participant-label">Date</span>
                            <span id="detail-date" class="participant-value"></span>
                        </div>
                    </div>
                    <div id="detail-labels-row" class="detail-labels"></div>
                    <div id="detail-attachments" class="detail-attachments"></div>
                    <div id="detail-body" class="detail-body"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
